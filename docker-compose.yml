version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: game-rec-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: recommendation_api/Dockerfile
    container_name: game-rec-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=
      - ARTIFACTS_PATH=model_artifacts
      - API_KEY=${API_KEY:-dev-insecure-key}
    volumes:
      - ./model_artifacts:/app/model_artifacts:ro
    depends_on:
      - redis
    # NOTE: Redis must be populated before the first `docker-compose up`.
    # Run `python -m scripts.init_redis` after `docker-compose up redis`.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/health').read())\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  web:
    build:
      context: ./gamelens-web
      dockerfile: Dockerfile
    container_name: game-rec-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_KEY=${API_KEY:-dev-insecure-key}
    volumes:
      - ./steam_header:/app/public/images:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
